name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish macOS (arm64)
        run: dotnet publish src/McpDesktopUi.MacOS/ -c Release -o publish/macos

      - name: Create archive
        run: |
          cd publish/macos
          chmod +x mcp-desktop-ui
          tar -czf ../../mcp-desktop-ui-macos-arm64.tar.gz mcp-desktop-ui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: mcp-desktop-ui-macos-arm64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows (x64)
        run: dotnet publish src/McpDesktopUi.Windows/ -c Release -o publish/windows

      - name: Create archive
        run: Compress-Archive -Path publish/windows/mcp-desktop-ui.exe -DestinationPath mcp-desktop-ui-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: mcp-desktop-ui-windows-x64.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mcp-desktop-ui-macos-arm64.tar.gz
            mcp-desktop-ui-windows-x64.zip
